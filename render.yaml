# Render reads this file and creates everything in one click ("Blueprint").
services:
  - type: web
    name: staypredeal
    runtime: node
    plan: starter            # ~$7/mo. Use "free" to try it (sleeps when idle).
    region: frankfurt        # EU region (GDPR + close to Romania)
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: staypredeal-db
          property: connectionString
      - key: BASE_DOMAIN
        value: ""            # leave empty until you connect a domain, then put: staypredeal.ro

databases:
  - name: staypredeal-db
    plan: basic-256mb        # smallest paid Postgres. "free" works but expires after 30 days.
    region: frankfurt
