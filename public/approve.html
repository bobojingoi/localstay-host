<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>LocalStay · Aprobare unitate</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#e6e9ee;--ink:#1c2430;--text:#566072;--muted:#8b94a3;--brand:#2f7355;--brand-d:#255c44;--brand-soft:#e8f2ec;--red:#cf4b4b;--amber:#c8861a;--shadow:0 1px 2px rgba(16,24,40,.04),0 24px 60px -28px rgba(16,24,40,.4)}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#15201a 0,#15201a 240px,var(--bg) 240px,var(--bg) 100%);min-height:100vh;color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:48px 20px 60px}
.brand{display:flex;align-items:center;gap:11px;color:#fff;margin-bottom:30px}
.brand .dot{width:38px;height:38px;border-radius:10px;background:var(--brand);display:grid;place-items:center}
.brand b{font-size:18px;font-weight:700}
.brand small{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9fbaab;margin-top:1px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px 26px 28px}
h1{font-size:21px;color:var(--ink);margin:0 0 4px}
.lede{color:var(--muted);font-size:14px;margin:0 0 20px}
.unit{font-size:17px;font-weight:700;color:var(--ink)}
.links{display:flex;flex-direction:column;gap:10px;margin:18px 0 22px}
.lnk{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:13px 15px;text-decoration:none;color:var(--ink);font-weight:600;transition:.15s}
.lnk:hover{border-color:var(--brand);background:var(--brand-soft)}
.lnk .li{width:34px;height:34px;border-radius:9px;background:var(--brand-soft);display:grid;place-items:center;flex:none}
.lnk .li svg{width:17px;height:17px;color:var(--brand)}
.lnk .lt{flex:1;min-width:0}
.lnk .lt b{display:block;font-size:14px}
.lnk .lt span{font-size:12.5px;color:var(--muted);font-weight:500}
.lnk .arr{color:var(--muted)}
.q{font-size:14px;color:var(--ink);font-weight:600;margin:4px 0 10px}
textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font:inherit;font-size:14px;color:var(--ink);background:#fcfdfe;resize:vertical;min-height:64px}
textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);background:#fff}
.row{display:flex;gap:12px;margin-top:16px}
.btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;border-radius:12px;padding:13px 18px;cursor:pointer;border:0;transition:.18s}
.btn-ok{background:var(--brand);color:#fff}.btn-ok:hover{background:var(--brand-d)}
.btn-no{background:#fff;color:var(--red);border:1px solid #f0d3d3}.btn-no:hover{background:#fdf3f3}
.btn:disabled{opacity:.5;cursor:default}
.state{display:flex;align-items:center;gap:10px;border-radius:12px;padding:14px 16px;font-weight:600;font-size:14px}
.state.ok{background:var(--brand-soft);color:var(--brand-d)}
.state.no{background:#fbeaea;color:#a23b3b}
.state.pend{background:#fdf4e3;color:#8a6516}
.muted{color:var(--muted);font-size:13px;margin-top:14px}
.err{color:var(--red);font-size:14px;margin-top:14px;display:none}
.center{text-align:center;padding:20px 0}
.spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:s .8s linear infinite;margin:0 auto}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg></span><span><b>LocalStay</b><small>Aprobare unitate</small></span></div>
  <div class="card" id="card">
    <div class="center"><div class="spin"></div></div>
  </div>
</div>
<script>
(function(){
  var token = location.pathname.split("/").filter(Boolean).pop() || "";
  var card = document.getElementById("card");
  var data = null;

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function origin(p){ return p && p.charAt(0)==="/" ? (location.origin + p) : p; }

  var ICON = {
    page: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>',
    site: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>',
    admin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>'
  };

  function decidedView(status, note){
    if(status==="approved") return '<div class="state ok">✓ Unitate aprobată. Mulțumim!</div><p class="muted">Site-ul tău este confirmat. Poți oricând să-i modifici conținutul din consolă.</p>';
    if(status==="rejected") return '<div class="state no">✕ Unitate respinsă.'+(note?' — '+esc(note):'')+'</div><p class="muted">Echipa LocalStay a fost notificată și va reveni cu ajustări.</p>';
    return "";
  }

  function render(){
    if(!data){ return; }
    var L = data.links || {};
    if(data.status==="approved" || data.status==="rejected"){
      card.innerHTML = '<h1>'+esc(data.name)+'</h1><p class="lede">Această unitate a fost deja evaluată.</p>'+decidedView(data.status, data.note);
      return;
    }
    card.innerHTML =
      '<h1>Verifică-ți unitatea</h1>'+
      '<p class="lede">Te rugăm să verifici site-ul generat pentru <b class="unit">'+esc(data.name)+'</b> și apoi să aprobi sau să respingi publicarea.</p>'+
      '<div class="links">'+
        '<a class="lnk" target="_blank" rel="noopener" href="'+esc(origin(L.site))+'"><span class="li">'+ICON.site+'</span><span class="lt"><b>Site-ul generat</b><span>așa arată pagina publică a unității</span></span><span class="arr">→</span></a>'+
        '<a class="lnk" target="_blank" rel="noopener" href="'+esc(origin(L.console))+'"><span class="li">'+ICON.admin+'</span><span class="lt"><b>Consola de administrare</b><span>editezi conținut, prețuri, calendar</span></span><span class="arr">→</span></a>'+
      '</div>'+
      '<div class="q">Aprobi publicarea acestei unități?</div>'+
      '<textarea id="note" placeholder="Opțional: un mesaj sau motivul respingerii…"></textarea>'+
      '<div class="row"><button class="btn btn-ok" id="ok">Aprobă</button><button class="btn btn-no" id="no">Respinge</button></div>'+
      '<div class="err" id="err"></div>';
    document.getElementById("ok").onclick=function(){ decide("approved"); };
    document.getElementById("no").onclick=function(){ decide("rejected"); };
  }

  async function decide(decision){
    var err=document.getElementById("err"); err.style.display="none";
    var note=(document.getElementById("note")||{}).value||"";
    if(decision==="rejected" && !note.trim()){ err.textContent="Te rugăm să adaugi un scurt motiv pentru respingere."; err.style.display="block"; return; }
    document.getElementById("ok").disabled=true; document.getElementById("no").disabled=true;
    try{
      var r=await fetch("/api/approval/"+encodeURIComponent(token),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({decision:decision,note:note})});
      var d=await r.json().catch(function(){return{};});
      if(!r.ok){ err.textContent=d.error||"A apărut o eroare."; err.style.display="block"; document.getElementById("ok").disabled=false; document.getElementById("no").disabled=false; return; }
      card.innerHTML='<h1>'+esc(data.name)+'</h1>'+decidedView(decision, note);
    }catch(e){ err.textContent="Conexiune eșuată. Reîncearcă."; err.style.display="block"; document.getElementById("ok").disabled=false; document.getElementById("no").disabled=false; }
  }

  (async function(){
    try{
      var r=await fetch("/api/approval/"+encodeURIComponent(token));
      if(!r.ok){ card.innerHTML='<h1>Link invalid</h1><p class="lede">Acest link de aprobare nu este valid sau a expirat. Contactează echipa LocalStay.</p>'; return; }
      data=await r.json(); render();
    }catch(e){ card.innerHTML='<h1>Eroare</h1><p class="lede">Nu am putut încărca unitatea. Reîncearcă mai târziu.</p>'; }
  })();
})();
</script>
</body>
</html>
