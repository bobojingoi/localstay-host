<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LocalStay · Autentificare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#e6e9ee;--ink:#1c2430;--text:#566072;--muted:#8b94a3;--brand:#2f7355;--brand-d:#255c44;--brand-soft:#e8f2ec;--red:#cf4b4b;--shadow:0 1px 2px rgba(16,24,40,.04),0 24px 60px -28px rgba(16,24,40,.4)}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#15201a 0,#15201a 280px,var(--bg) 280px,var(--bg) 100%);min-height:100vh;color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2{margin:0;color:var(--ink);font-weight:800;letter-spacing:-.02em}
.shell{max-width:420px;margin:0 auto;padding:54px 20px 40px}
.brand{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:26px;color:#fff}
.brand .dot{width:38px;height:38px;border-radius:10px;background:var(--brand);display:grid;place-items:center}
.brand b{font-size:19px;font-weight:800}
.brand small{display:block;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#7fa890}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px 28px}
.card h1{font-size:22px}
.card .sub{margin:6px 0 22px;font-size:14px;color:var(--muted)}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:14px 0 6px}
input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:15px;color:var(--ink);font-family:inherit;background:#fcfdfe}
input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);background:#fff}
.btn{width:100%;margin-top:22px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;border-radius:11px;padding:13px 22px;cursor:pointer;border:0;background:var(--brand);color:#fff;transition:.18s}
.btn:hover{background:var(--brand-d)}
.btn:disabled{opacity:.6;cursor:default}
.err{background:#fbecec;border:1px solid #f1d3d3;color:#a23b3b;border-radius:11px;padding:11px 14px;font-size:13.5px;margin-top:16px;display:none}
.foot{text-align:center;font-size:12.5px;color:var(--muted);margin-top:20px}
</style>
</head>
<body>
<div class="shell">
  <div class="brand">
    <span class="dot"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg></span>
    <span><b>LocalStay</b><small>Administrare</small></span>
  </div>
  <div class="card">
    <h1>Autentificare</h1>
    <p class="sub">Intră în contul tău de administrare.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="nume@exemplu.ro" autofocus>
    <label for="password">Parolă</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
    <div class="err" id="err"></div>
    <button class="btn" id="btn">Intră în cont</button>
  </div>
  <div class="foot">Probleme la autentificare? Contactează administratorul platformei.</div>
</div>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var btn=$("btn"), err=$("err");
  function nextUrl(){ try{ var n=new URLSearchParams(location.search).get("next"); return n&&n.charAt(0)==="/"?n:null; }catch(e){ return null; } }
  function showErr(m){ err.textContent=m; err.style.display="block"; }
  async function submit(){
    err.style.display="none";
    var email=$("email").value.trim(), password=$("password").value;
    if(!email||!password){ showErr("Completează email și parolă."); return; }
    btn.disabled=true; btn.textContent="Se verifică…";
    try{
      var r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:password})});
      var d=await r.json().catch(function(){return {};});
      if(!r.ok){ showErr(d.error||"Autentificare eșuată."); btn.disabled=false; btn.textContent="Intră în cont"; return; }
      location.href = nextUrl() || "/importer.html";
    }catch(e){ showErr("Eroare de rețea. Reîncearcă."); btn.disabled=false; btn.textContent="Intră în cont"; }
  }
  btn.addEventListener("click",submit);
  ["email","password"].forEach(function(id){ $(id).addEventListener("keydown",function(e){ if(e.key==="Enter") submit(); }); });
})();
</script>
</body>
</html>
