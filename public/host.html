<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>LocalStay · Panou hotelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#e6e9ee;--ink:#1c2430;--text:#566072;--muted:#8b94a3;--brand:#2f7355;--brand-d:#255c44;--brand-soft:#e8f2ec;--amber:#c98a2e;--red:#cf4b4b;--shadow:0 1px 2px rgba(16,24,40,.04),0 16px 40px -24px rgba(16,24,40,.3)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0;color:var(--ink);font-weight:800;letter-spacing:-.02em}
a{color:inherit;text-decoration:none}
.top{background:#15201a;color:#fff;padding:16px 0}
.wrap{max-width:920px;margin:0 auto;padding:0 24px}
.top .wrap{display:flex;align-items:center;gap:12px}
.top .dot{width:34px;height:34px;border-radius:9px;background:var(--brand);display:grid;place-items:center}
.top b{font-size:17px;font-weight:800}.top small{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#7fa890}
.hero{padding:44px 0 10px}
.hero h1{font-size:30px}.hero p{margin:10px 0 0;max-width:62ch}
.main{padding:24px 0 70px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
.card .hd{padding:20px 24px;border-bottom:1px solid #eef1f4}.card .hd h2{font-size:17px}.card .hd p{margin:3px 0 0;font-size:13px;color:var(--muted)}
.card .bd{padding:22px 24px}
.drop{border:2px dashed #cfd6df;border-radius:14px;padding:34px;text-align:center;transition:.2s;cursor:pointer;background:#fcfdfe}
.drop.over{border-color:var(--brand);background:var(--brand-soft)}
.drop svg{width:40px;height:40px;color:var(--brand);margin-bottom:10px}
.drop b{color:var(--ink)}
.drop small{display:block;color:var(--muted);margin-top:4px}
.or{text-align:center;color:var(--muted);font-size:13px;margin:16px 0}
textarea{width:100%;min-height:120px;border:1px solid var(--line);border-radius:11px;padding:12px;font-family:ui-monospace,monospace;font-size:12.5px;color:var(--ink);resize:vertical}
textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;border-radius:11px;padding:12px 22px;cursor:pointer;border:1.5px solid transparent;transition:.18s}
.btn-pri{background:var(--brand);color:#fff}.btn-pri:hover{background:var(--brand-d)}
.btn-out{background:#fff;border-color:var(--line);color:var(--ink)}.btn-out:hover{border-color:var(--muted)}
.btn svg{width:17px;height:17px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:18px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:6px 0 18px}
.summary .s{background:var(--brand-soft);border-radius:12px;padding:14px}
.summary .s b{display:block;font-size:24px;color:var(--brand);font-weight:800;line-height:1}
.summary .s span{font-size:12px;color:var(--text)}
.prop-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px}
.prop-item .ph{width:54px;height:54px;border-radius:10px;background:#15201a center/cover;flex:none}
.prop-item .meta{flex:1;min-width:0}.prop-item .meta b{color:var(--ink);font-size:15px}.prop-item .meta .sl{font-size:12.5px;color:var(--muted);font-family:ui-monospace,monospace}
.prop-item .acts{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:9px;border:1px solid var(--line);color:var(--ink);background:#fff}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip svg{width:15px;height:15px}
.del{background:none;border:0;color:var(--muted);cursor:pointer;padding:7px;border-radius:8px}.del:hover{background:#fbecec;color:var(--red)}
.flow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--brand-soft);border-radius:12px;padding:14px 16px;font-size:13.5px;color:var(--brand);font-weight:600;margin-bottom:22px}
.flow svg{width:16px;height:16px}
.err{background:#fbecec;border:1px solid #f1d3d3;color:#a23b3b;border-radius:11px;padding:12px 15px;font-size:13.5px;margin-top:14px;display:none}
.empty{text-align:center;color:var(--muted);padding:20px;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:500;opacity:0;transition:.3s;z-index:60}.toast.show{opacity:1;transform:translateX(-50%)}
@media(max-width:620px){.summary{grid-template-columns:1fr 1fr}}
</style>
<style>
/* ---- dashboard shell (sidebar + tabs) ---- */
.top .wrap{max-width:1180px}
.shell{display:flex;gap:26px;max-width:1180px;margin:0 auto;padding:26px 24px 72px}
.sidebar{width:228px;flex:none;position:sticky;top:26px;align-self:flex-start}
.nav{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:8px}
.navitem{display:flex;align-items:center;gap:11px;width:100%;border:0;background:none;font:inherit;font-size:14.5px;font-weight:600;color:var(--text);padding:11px 13px;border-radius:11px;cursor:pointer;text-align:left}
.navitem svg{width:18px;height:18px;color:var(--muted);flex:none}
.navitem:hover{background:#f6f7fb}
.navitem.active{background:var(--brand-soft);color:var(--brand-d)}
.navitem.active svg{color:var(--brand)}
.content{flex:1;min-width:0}
.pane{display:none}
.pane.active{display:block;animation:paneIn .22s ease}
@keyframes paneIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.pane-head{padding:2px 2px 18px}
.pane-head h1{font-size:25px}
.pane-head p{margin:7px 0 0;color:var(--muted);max-width:64ch;font-size:14px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px}
.kpi .ic{width:36px;height:36px;border-radius:10px;background:var(--brand-soft);display:grid;place-items:center;margin-bottom:13px}
.kpi .ic svg{width:18px;height:18px;color:var(--brand)}
.kpi b{display:block;font-size:30px;color:var(--ink);font-weight:800;line-height:1}
.kpi span{font-size:12.5px;color:var(--muted)}
.qa{display:flex;gap:12px;flex-wrap:wrap}
/* ---- host dashboard ---- */
.period{display:inline-flex;gap:4px;margin-top:14px;background:#eef1f4;border-radius:10px;padding:4px}
.period button{border:0;background:none;font:inherit;font-size:13px;font-weight:600;color:var(--muted);padding:6px 13px;border-radius:7px;cursor:pointer}
.period button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(16,24,40,.12)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dcard{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 18px}
.dcard h3{font-size:14px;font-weight:700;color:var(--ink);margin:0 0 3px}
.dcard .sub{font-size:12px;color:var(--muted);margin:0 0 14px}
.funnel{display:flex;flex-direction:column;gap:9px}
.frow{display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:center;font-size:13px}
.frow .fl{color:var(--muted)}
.fbar{height:9px;border-radius:6px;background:var(--brand-soft);overflow:hidden}
.fbar span{display:block;height:100%;background:var(--brand);border-radius:6px}
.frow .fv{font-weight:700;color:var(--ink);min-width:34px;text-align:right}
.fconv{font-size:12px;color:var(--muted);margin-top:10px}
.stays{display:flex;flex-direction:column;gap:0}
.stay{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid #f0f2f5}
.stay:first-child{border-top:0}
.stay .sd{width:46px;height:46px;border-radius:11px;background:var(--brand-soft);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none;line-height:1}
.stay .sd b{font-size:16px;color:var(--brand-d)}
.stay .sd i{font-size:10px;color:var(--brand);font-style:normal;text-transform:uppercase}
.stay .si{min-width:0;flex:1}
.stay .si b{display:block;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stay .si span{font-size:12px;color:var(--muted)}
.stay .sg{font-size:12px;color:var(--muted);flex:none}
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:600;padding:0 8px 9px}
.dtable td{padding:9px 8px;border-top:1px solid #f0f2f5}
.dtable td:first-child,.dtable th:first-child{padding-left:0}
.dtable td b{color:var(--ink)}
.occbar{display:inline-block;width:56px;height:7px;border-radius:5px;background:#eef1f4;vertical-align:middle;margin-right:7px;overflow:hidden}
.occbar span{display:block;height:100%;background:var(--brand);border-radius:5px}
.trend{display:flex;align-items:flex-end;gap:2px;height:90px;margin-top:6px}
.trend .tb{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:1px;min-width:0}
.trend .tb .v{background:var(--brand);border-radius:2px 2px 0 0;min-height:1px}
.trend .tb .r{background:#f0a23b;border-radius:2px 2px 0 0;min-height:0}
.tlegend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:9px}
.tlegend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}
.dempty{font-size:13px;color:var(--muted);padding:8px 0}
.estnote{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5}
@media(max-width:760px){.dash-grid{grid-template-columns:1fr}}
.hidden-hero{display:none}
/* auto-created host credentials shown after import */
.creds{border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin:2px 0 18px;background:#fbfdfc}
.creds .ct{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--ink);font-size:14px;margin-bottom:3px}
.creds .ct svg{width:16px;height:16px;color:var(--brand)}
.creds .cn{font-size:12.5px;color:var(--muted);margin-bottom:11px}
.creds .cgrid{display:grid;grid-template-columns:auto 1fr auto;gap:8px 12px;align-items:center}
.creds .cl{font-size:12.5px;color:var(--muted)}
.creds .cv{font-family:ui-monospace,monospace;font-size:13.5px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.creds .ccopy{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 11px;font:inherit;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer}
.creds .ccopy:hover{border-color:var(--brand);color:var(--brand)}
.creds.exists{background:#f6f7fb}
.creds .cnote{font-size:12.5px;color:var(--muted)}
/* role-based copy visibility */
body.is-host .admin-only{display:none}
body:not(.is-host) .host-only{display:none}
/* inside panes the cards no longer need their own outer margin doubling */
.pane .card:last-child{margin-bottom:0}
@media(max-width:860px){
  .shell{flex-direction:column;gap:16px;padding:18px 18px 60px}
  .sidebar{width:auto;position:static}
  .nav{display:flex;overflow-x:auto;padding:6px}
  .navitem{white-space:nowrap;width:auto}
  .navitem span{font-size:14px}
  .kpis{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.kpis{grid-template-columns:1fr}}
</style>
<style>
.userbox{margin-left:auto;display:none;align-items:center;gap:10px}
body.is-host .del{display:none}
.userbox.show{display:flex}
.ub-email{color:#cfe0d6;font-size:13px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ub-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;font:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:9px;cursor:pointer}
.ub-btn:hover{background:rgba(255,255,255,.2)}
.ub-out{background:transparent}
.modal{position:fixed;inset:0;background:rgba(16,24,40,.5);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
.modal.show{display:flex}
.modal-card{background:#fff;border-radius:18px;width:100%;max-width:460px;max-height:90vh;overflow:auto;box-shadow:0 24px 70px -20px rgba(16,24,40,.5)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #eef1f4}
.modal-hd h2{font-size:18px}
.modal-x{background:none;border:0;font-size:26px;line-height:1;color:#8b94a3;cursor:pointer}
.modal-bd{padding:20px 22px}
.modal-bd label{display:block;font-size:13px;font-weight:600;color:#1c2430;margin:13px 0 6px}
.modal-bd label small{font-weight:400;color:#8b94a3}
.modal-bd .req{color:#cf4b4b}
.modal-bd input{width:100%;border:1px solid #e6e9ee;border-radius:10px;padding:11px 13px;font:inherit;font-size:14.5px;color:#1c2430;background:#fcfdfe}
.modal-bd input:focus{outline:none;border-color:#2f7355;box-shadow:0 0 0 3px #e8f2ec;background:#fff}
.modal-note{font-size:13px;color:#8b94a3;margin:0 0 4px}
.prop-picker{border:1px solid #e6e9ee;border-radius:11px;max-height:180px;overflow:auto;padding:4px}
.prop-picker label{display:flex;align-items:center;gap:9px;margin:0;padding:8px 10px;border-radius:8px;font-weight:500;cursor:pointer;font-size:14px}
.prop-picker label:hover{background:#f6f7fb}
.prop-picker input{width:auto}
.prop-picker .none{color:#8b94a3;font-size:13px;padding:10px}
.btn-del{background:#fff;border:1.5px solid #f1d3d3;color:#cf4b4b}
.btn-del:hover{background:#fbecec}
.host-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid #e6e9ee;border-radius:12px;margin-bottom:10px}
.host-row .hi{flex:1;min-width:0}
.host-row .hi b{color:#1c2430;font-size:14.5px}
.host-row .hi .hs{font-size:12.5px;color:#8b94a3;margin-top:2px}
.stat-totals{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-totals .s{background:#f6f7fb;border:1px solid #e6e9f0;border-radius:14px;padding:14px 12px;text-align:center}
.stat-totals .s b{display:block;font-size:24px;color:#1a2238;font-weight:800}
.stat-totals .s span{font-size:12px;color:#8a92a6}
.stat-cols{display:grid;grid-template-columns:1.3fr 1fr;gap:20px}
.stat-col h3{font-size:14px;color:#1a2238;margin:0 0 10px}
.stat-col h3 small{font-weight:400;color:#8a92a6;font-size:12px}
.ev{border:1px solid #e6e9f0;border-radius:12px;padding:11px 13px;margin-bottom:9px;background:#fff}
.ev-sm{padding:9px 13px}
.ev-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.ev-top b{color:#1a2238;font-size:14.5px}
.ev-top span{color:#8a92a6;font-size:12px;white-space:nowrap}
.ev-sub{color:#56607a;font-size:13px;margin-top:3px}
.ev-sub2{color:#56607a;font-size:12.5px;margin-top:3px}
.ev a{color:#1faa57;text-decoration:none}
.lnkbtn{background:none;border:0;color:#1faa57;cursor:pointer;font-size:inherit;padding:0;text-decoration:underline}
@media(max-width:760px){.stat-totals{grid-template-columns:repeat(2,1fr)}.stat-cols{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="top"><div class="wrap"><span class="dot"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg></span><span><b>LocalStay</b><small>Panou hotelier</small></span><div class="userbox" id="userbox"><span class="ub-email" id="ubEmail"></span><button class="ub-btn" id="btnAccount">Setări cont</button><button class="ub-btn ub-out" id="btnLogout">Deconectare</button></div></div></div>

<div class="shell">
  <aside class="sidebar"><nav class="nav" id="dashNav">
    <button class="navitem active" data-nav="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg><span>Panou</span></button>
    <button class="navitem" data-nav="properties"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg><span>Proprietățile tale</span></button>
  </nav></aside>

  <main class="content">
    <section class="pane active" data-pane="dashboard">
      <div class="pane-head">
        <h1>Bun venit</h1>
        <p>Privire de ansamblu asupra proprietăților tale.</p>
        <div class="period" id="dashPeriod">
          <button type="button" data-days="7">7 zile</button><button type="button" data-days="30" class="on">30 zile</button><button type="button" data-days="90">90 zile</button>
        </div>
      </div>
      <div class="kpis" id="dashKpis"></div>
      <div id="dashHost"></div>
      <div class="card"><div class="hd"><h2>Acțiuni rapide</h2></div><div class="bd"><div class="qa" id="dashActions"></div></div></div>
    </section>

    <section class="pane" data-pane="properties">
      <div class="pane-head"><h1>Proprietățile tale</h1><p>Selectează o proprietate ca să editezi conținutul, pozele, prețurile și disponibilitatea.</p></div>
      <div class="card"><div class="hd"><h2>Proprietăți</h2></div><div class="bd"><div id="list"></div></div></div>
    </section>
  </main>
</div>

<div class="modal" id="accountModal"><div class="modal-card">
  <div class="modal-hd"><h2>Setări cont</h2><button class="modal-x" data-close>&times;</button></div>
  <div class="modal-bd">
    <p class="modal-note">Lasă gol câmpurile pe care nu vrei să le schimbi.</p>
    <label>Parola actuală <span class="req">*</span></label><input id="acCur" type="password" autocomplete="current-password">
    <label>Email nou</label><input id="acEmail" type="email" autocomplete="username">
    <label>Parolă nouă <small>(min. 8 caractere)</small></label><input id="acPass" type="password" autocomplete="new-password">
    <div class="err" id="acErr"></div>
    <div class="row"><button class="btn btn-pri" id="acSave">Salvează</button><button class="btn btn-out" data-close>Renunță</button></div>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
let toastT;function toast(m){const t=$("#toast");if(!t)return;t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2200);}
async function api(u,o){ o=o||{}; o.headers=Object.assign({"Content-Type":"application/json"},o.headers||{}); o.credentials="same-origin"; return fetch(u,o); }

// public unit URL builder
let CFG={baseDomain:"",_loaded:false};
async function loadCfg(){ if(CFG._loaded) return CFG; try{ const c=await fetch("/api/config").then(r=>r.json()); CFG={baseDomain:(c&&c.baseDomain)||"",_loaded:true}; }catch(e){ CFG._loaded=true; } return CFG; }
function pubUrl(slug){ return CFG.baseDomain ? ("https://"+slug+"."+CFG.baseDomain) : ("/s/"+slug); }

  var ICONS = {
    bed:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v6M3 14h18M3 18v2M21 18v2M7 10V8a2 2 0 0 1 2-2h2"/></svg>',
    inbox:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h5l2 3h4l2-3h5M5 5h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>',
    phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.8a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg>',
    gauge:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 13a3 3 0 0 1 3-3M3.5 18a9 9 0 1 1 17 0M12 13l4-4"/></svg>',
    money:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 9v6M18 9v6"/></svg>',
    eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>'
  };

  function go(name){
    [].slice.call(document.querySelectorAll("#dashNav .navitem")).forEach(function(b){ b.classList.toggle("active", b.getAttribute("data-nav")===name); });
    [].slice.call(document.querySelectorAll(".pane")).forEach(function(p){ p.classList.toggle("active", p.getAttribute("data-pane")===name); });
    if(name==="dashboard") renderDash();
    if(name==="properties") renderList();
    try{ window.scrollTo({top:0,behavior:"smooth"}); }catch(e){}
  }
  window.__go=go;
  [].slice.call(document.querySelectorAll("#dashNav .navitem")).forEach(function(b){ b.onclick=function(){ go(b.getAttribute("data-nav")); }; });

  function tile(ic,n,l){ return '<div class="kpi"><div class="ic">'+ic+'</div><b>'+n+'</b><span>'+l+'</span></div>'; }
  function actBtn(label,cls,handler){ var b=document.createElement('button'); b.className='btn '+cls; b.textContent=label; b.onclick=handler; return b; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function money(n,cur){ try{ return new Intl.NumberFormat('ro-RO').format(Math.round(n||0))+' '+(cur||'RON'); }catch(e){ return (n||0)+' '+(cur||'RON'); } }
  function dmShort(ds){ if(!ds) return '—'; var p=ds.split('-'); var mn=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','noi','dec']; return (+p[2])+' '+(mn[(+p[1])-1]||''); }
  var DASH_DAYS = 30;

  function renderActions(){
    var act=document.getElementById("dashActions"); if(!act) return; act.innerHTML="";
    act.appendChild(actBtn("Vezi proprietățile","btn-pri",function(){ go("properties"); }));
    var ba=document.getElementById("btnAccount");
    act.appendChild(actBtn("Setări cont","btn-out",function(){ if(ba) ba.click(); }));
  }
  function renderDash(){ renderHostDash(DASH_DAYS); renderActions(); }

  async function renderHostDash(days){
    var kb=document.getElementById('dashKpis'), hostBox=document.getElementById('dashHost');
    if(kb) kb.innerHTML='<div class="dempty">Se încarcă…</div>';
    var o=null; try{ o=await fetch('/api/host/overview?days='+days).then(function(r){return r.ok?r.json():null;}); }catch(e){}
    if(!o){ if(kb) kb.innerHTML='<div class="dempty">Nu am putut încărca datele.</div>'; if(hostBox) hostBox.innerHTML=''; return; }

    // KPI tiles
    if(kb) kb.innerHTML =
      tile(ICONS.gauge, o.occupancy+'%', 'grad de ocupare · următoarele '+days+' zile')
      + tile(ICONS.money, money(o.estRevenue,o.currency), 'venit estimat · următoarele '+days+' zile')
      + tile(ICONS.inbox, o.requests, 'cereri de rezervare · ultimele '+days+' zile')
      + tile(ICONS.eye, o.views, 'vizualizări · ultimele '+days+' zile')
      + tile(ICONS.phone, o.reveals, 'dezvăluiri telefon · ultimele '+days+' zile');

    if(!hostBox) return;
    var maxF=Math.max(o.views,o.reveals,o.requests,1);
    function fbar(label,val){ return '<div class="frow"><span class="fl">'+label+'</span><div class="fbar"><span style="width:'+Math.round(val/maxF*100)+'%"></span></div><span class="fv">'+val+'</span></div>'; }

    // trend bars
    var tr=o.trend||[]; var maxT=Math.max.apply(null,tr.map(function(x){return Math.max(x.views,x.requests);}).concat([1]));
    var bars=tr.map(function(x){
      var vh=Math.round(x.views/maxT*70), rh=Math.round(x.requests/maxT*70);
      return '<div class="tb" title="'+dmShort(x.date)+': '+x.views+' vizualizări, '+x.requests+' cereri"><div class="r" style="height:'+rh+'px"></div><div class="v" style="height:'+vh+'px"></div></div>';
    }).join('');

    // check-ins / check-outs
    function stayRow(s,kind){
      var d=kind==='in'?s.checkin:s.checkout;
      var dd=d?d.split('-'):['','',''];
      return '<div class="stay"><div class="sd"><b>'+(+dd[2]||'')+'</b><i>'+(['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','noi','dec'][(+dd[1])-1]||'')+'</i></div>'+
        '<div class="si"><b>'+esc(s.name)+'</b><span>'+esc(s.property)+(s.phone?(' · '+esc(s.phone)):'')+'</span></div>'+
        '<span class="sg">'+(s.guests||0)+' oasp.</span></div>';
    }
    var arr=(o.arrivals||[]), dep=(o.departures||[]);
    var arrHtml = arr.length ? arr.slice(0,6).map(function(s){return stayRow(s,'in');}).join('') : '<div class="dempty">Nicio sosire programată.</div>';
    var depHtml = dep.length ? dep.slice(0,6).map(function(s){return stayRow(s,'out');}).join('') : '<div class="dempty">Nicio plecare programată.</div>';

    // per-property table
    var pp=(o.perProperty||[]);
    var ppHtml = pp.length ? '<table class="dtable"><thead><tr><th>Proprietate</th><th>Ocupare</th><th>Venit estimat</th></tr></thead><tbody>'+
      pp.map(function(p){ return '<tr><td><b>'+esc(p.name)+'</b></td><td><span class="occbar"><span style="width:'+p.occupancy+'%"></span></span>'+p.occupancy+'%</td><td>'+money(p.estRevenue,p.currency)+'</td></tr>'; }).join('')+
      '</tbody></table>' : '<div class="dempty">Nicio proprietate.</div>';

    hostBox.innerHTML =
      '<div class="dash-grid">'+
        '<div class="dcard"><h3>Pâlnie de conversie</h3><p class="sub">ultimele '+days+' zile</p>'+
          '<div class="funnel">'+fbar('Vizualizări',o.views)+fbar('Dezvăluiri telefon',o.reveals)+fbar('Cereri rezervare',o.requests)+'</div>'+
          '<div class="fconv">Vizualizare → dezvăluire: <b>'+o.conv.viewToReveal+'%</b> · dezvăluire → cerere: <b>'+o.conv.revealToRequest+'%</b></div>'+
        '</div>'+
        '<div class="dcard"><h3>Trafic și cereri</h3><p class="sub">pe zi · ultimele '+days+' zile</p>'+
          '<div class="trend">'+bars+'</div>'+
          '<div class="tlegend"><span><i style="background:var(--brand)"></i>Vizualizări</span><span><i style="background:#f0a23b"></i>Cereri</span></div>'+
        '</div>'+
        '<div class="dcard"><h3>Check-in-uri ce urmează</h3><p class="sub">următoarele '+days+' zile</p><div class="stays">'+arrHtml+'</div></div>'+
        '<div class="dcard"><h3>Check-out-uri ce urmează</h3><p class="sub">următoarele '+days+' zile</p><div class="stays">'+depHtml+'</div></div>'+
      '</div>'+
      (pp.length>1 ? '<div class="dcard" style="margin-bottom:16px"><h3>Pe proprietate</h3><p class="sub">ocupare în următoarele '+days+' zile</p>'+ppHtml+'</div>' : '')+
      '<div class="estnote">Gradul de ocupare și venitul estimat se calculează din calendarul de disponibilitate (blocări manuale + sincronizări Booking/Airbnb) și din prețurile setate. Venitul este o <b>estimare</b> a nopților ocupate × tarif — platforma nu procesează plăți. Traficul se înregistrează din momentul activării.</div>';
  }

  // period selector
  (function(){ var p=document.getElementById("dashPeriod"); if(!p) return;
    p.addEventListener("click", function(e){ var b=e.target.closest("button[data-days]"); if(!b) return;
      DASH_DAYS=+b.getAttribute("data-days");
      [].slice.call(p.querySelectorAll("button")).forEach(function(x){ x.classList.toggle("on", x===b); });
      renderHostDash(DASH_DAYS);
    });
  })();

  async function renderList(){
    var box=$("#list"); await loadCfg();
    var idx=[]; try{ idx=await fetch("/api/properties").then(r=>r.json()); }catch(e){}
    if(!idx.length){ box.innerHTML='<div class="empty">Nicio proprietate alocată încă.</div>'; return; }
    box.innerHTML="";
    idx.forEach(function(p){
      var el=document.createElement("div"); el.className="prop-item";
      el.innerHTML='<div class="ph" style="background-image:url(\''+(p.hero||"")+'\')"></div>'+
        '<div class="meta"><b>'+(p.name||p.slug)+'</b><div class="sl">'+pubUrl(p.slug).replace(/^https?:\/\//,"")+'</div></div>'+
        '<div class="acts"><a class="chip" target="_blank" href="'+pubUrl(p.slug)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M7 7h10v10"/></svg> Site</a>'+
        '<a class="chip" target="_blank" href="/admin?slug='+p.slug+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg> Gestionează</a></div>';
      box.appendChild(el);
    });
  }

  /* account modal */
  function openModal(id){ var m=document.getElementById(id); if(m) m.classList.add("show"); }
  function closeModal(m){ if(m) m.classList.remove("show"); }
  [].slice.call(document.querySelectorAll("[data-close]")).forEach(function(b){ b.onclick=function(){ closeModal(b.closest(".modal")); }; });
  [].slice.call(document.querySelectorAll(".modal")).forEach(function(m){ m.addEventListener("click",function(e){ if(e.target===m) closeModal(m); }); });
  $("#btnAccount").onclick=function(){ $("#acCur").value="";$("#acEmail").value="";$("#acPass").value="";$("#acErr").style.display="none"; openModal("accountModal"); };
  $("#acSave").onclick=async function(){
    var err=$("#acErr"); err.style.display="none";
    var cur=$("#acCur").value, ne=$("#acEmail").value.trim(), np=$("#acPass").value;
    if(!cur){ err.textContent="Introdu parola actuală."; err.style.display="block"; return; }
    var body={ currentPassword:cur };
    if(ne) body.newEmail=ne;
    if(np) body.newPassword=np;
    var r=await api("/api/auth/change-credentials",{method:"POST",body:JSON.stringify(body)});
    var d=await r.json().catch(function(){return{};});
    if(!r.ok){ err.textContent=d.error||"Eroare."; err.style.display="block"; return; }
    closeModal($("#accountModal")); toast("Date actualizate");
    if(ne) $("#ubEmail").textContent=ne;
  };
  $("#btnLogout").onclick=async function(){ try{ await api("/api/auth/logout",{method:"POST"}); }catch(e){} location.href="/login"; };

  /* boot — host only; admins are sent to the admin hub */
  (async function boot(){
    var r; try{ r=await fetch("/api/auth/me",{credentials:"same-origin"}); }catch(e){ location.href="/login"; return; }
    if(!r.ok || r.status===401){ location.href="/login"; return; }
    var me=await r.json();
    if(me.role==="admin"){ location.href="/importer.html"; return; }
    $("#ubEmail").textContent=me.email||"";
    $("#userbox").classList.add("show");
    await loadCfg();
    renderDash();
    renderList();
  })();
</script>
</body>
</html>
