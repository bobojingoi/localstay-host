<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Property template</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b2742; --navy-2:#16203a; --footer:#171f33;
  --body:#56607a; --muted:#8a92a6;
  --accent:#e07d3e; --accent-d:#cb6c30;
  --green:#1faa57; --soft:#edeffb; --soft-2:#f6f7fb;
  --line:#e8eaf0; --bg:#ffffff;
  --radius:28px; --radius-sm:18px;
  --font-head:"Plus Jakarta Sans",system-ui,sans-serif;
  --font-body:"Inter",system-ui,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--body);font-family:var(--font-body);font-size:17px;line-height:1.62;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4{margin:0;font-family:var(--font-head);color:var(--navy);font-weight:800;line-height:1.1;letter-spacing:-.02em}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px}
.eyebrow{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px}
.lead{font-size:19px;line-height:1.65}
h2{font-size:clamp(23px,2.6vw,32px)}
.h2{letter-spacing:-.025em}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:var(--font-head);font-weight:700;font-size:16px;border-radius:100px;padding:15px 30px;cursor:pointer;border:1.5px solid transparent;transition:.22s;white-space:nowrap}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-d);transform:translateY(-2px)}
.btn-out{background:#fff;border-color:var(--navy);color:var(--navy)}
.btn-out:hover{background:var(--navy);color:#fff}
.btn-wa{background:#fff;border-color:var(--green);color:var(--green)}
.btn-wa:hover{background:var(--green);color:#fff}
.btn-ghost{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.5);color:#fff;backdrop-filter:blur(6px)}
.btn-ghost:hover{background:#fff;color:var(--navy);border-color:#fff}

/* NAV */
header.nav{position:absolute;top:0;left:0;right:0;z-index:60}
.nav-bar{display:flex;align-items:center;justify-content:space-between;gap:24px;max-width:1180px;margin:0 auto;padding:22px 28px}
.brand{display:flex;align-items:center;gap:11px;color:#fff}
.brand span{display:none}
.brand .mk{width:38px;height:38px}
.brand b{font-family:var(--font-head);font-weight:800;font-size:19px;letter-spacing:.02em;line-height:1;color:#fff}
.brand small{display:block;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:4px}
.nav-links{display:flex;align-items:center;gap:30px}
.nav-links a{color:rgba(255,255,255,.92);font-family:var(--font-head);font-weight:600;font-size:15px}
.nav-links a:hover{color:#fff}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-right .btn{padding:10px 22px;font-size:14px}
.burger{display:none;background:none;border:0;color:#fff;cursor:pointer;padding:6px}
header.nav.solid{position:fixed;background:rgba(27,39,66,.96);backdrop-filter:blur(10px);box-shadow:0 6px 30px -18px rgba(0,0,0,.4);animation:drop .3s ease}
@keyframes drop{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* HERO */
.hero{position:relative;padding:0}
.hero>.wrap{padding-top:0}
.hero-img{position:relative;height:clamp(500px,72vh,660px);min-height:0;max-height:none;margin-top:16px;border-radius:26px;overflow:hidden;background-position:center;background-size:cover;background-color:var(--navy)}
.hero-img.no-img{background:radial-gradient(120% 120% at 80% 10%,#2c3c6b 0%,#1c2746 45%,#161f3a 100%)}
.hero-img::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,28,52,.45),rgba(20,28,52,.12) 35%,rgba(18,25,44,.85))}
.hero-content{position:absolute;left:0;right:0;bottom:0;padding:44px clamp(28px,5vw,60px);z-index:2}
.hero-loc{display:inline-flex;align-items:center;gap:8px;color:#fff;font-weight:600;font-size:15px;background:rgba(255,255,255,.14);backdrop-filter:blur(6px);padding:8px 15px;border-radius:100px;margin-bottom:18px}
.hero-loc svg{flex:none;width:16px;height:16px}
.hero h1{color:#fff;font-size:clamp(29px,3.5vw,44px);max-width:20ch;letter-spacing:-.03em;line-height:1.04}
.hero .sub{color:rgba(255,255,255,.92);font-size:clamp(17px,2vw,21px);max-width:44ch;margin:18px 0 14px;font-weight:500}
.hero .price{color:#fff;font-family:var(--font-head);font-weight:700;font-size:18px;margin-bottom:24px}
.hero .price b{font-size:26px}
.hero-cta{display:flex;gap:13px;flex-wrap:wrap}
.hero-contact{display:none}

/* SECTION */
.sec{padding:60px 0}
.sec.tight{padding-top:60px}

/* PHOTO STRIP */
.strip{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(280px,1fr);gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 28px;margin:0 auto;max-width:1180px;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.strip .ph{scroll-snap-align:start;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:4/3;background:var(--navy) center/cover}

/* SPLIT overview */
.split{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.split .media{border-radius:var(--radius);overflow:hidden;aspect-ratio:1/1;background:var(--navy) center/cover}
.split h2{}
.split .desc{margin:20px 0 6px;font-size:18px}
.frows{margin-top:16px}
.frow{display:flex;align-items:center;gap:16px;padding:18px 0;border-bottom:1px solid var(--line)}
.frow:last-child{border-bottom:0}
.frow .ic{width:30px;height:30px;color:var(--navy);flex:none}
.frow .ic svg{width:30px;height:30px;stroke-width:1.4}
.frow .t{font-family:var(--font-head);font-weight:600;color:var(--navy);font-size:17px}
.split .acts{display:flex;gap:13px;flex-wrap:wrap;margin-top:28px}

/* HIGHLIGHT (soft card) */
.fcard{background:var(--soft);border-radius:34px;padding:26px;display:grid;grid-template-columns:1.05fr .95fr;gap:42px;align-items:center}
.fcard .media{border-radius:24px;overflow:hidden;aspect-ratio:4/3;background:#cdd2ee center/cover;min-height:300px}
.fcard .body{padding:18px 28px 18px 8px}
.fcard h2{}
.fcard p{margin:18px 0;font-size:17px}
.fcard .frow{border-color:#dfe2f4}

/* lists */
.lists{display:grid;grid-template-columns:1fr 1fr;gap:56px 80px}
.lblock h3{font-family:var(--font-head);font-size:24px;margin-bottom:6px}
.lrow{display:flex;align-items:center;gap:18px;padding:18px 0;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:0}
.lrow .ic{width:30px;flex:none;color:var(--navy)}
.lrow .ic svg{width:30px;height:30px;stroke-width:1.4}
.lrow .tx b{display:block;font-family:var(--font-head);font-weight:600;color:var(--navy);font-size:16.5px}
.lrow .tx small{color:var(--muted);font-size:14px}

/* GALLERY carousel */
.gal-head{margin-bottom:26px}
.gal-head h2{}
.carousel{position:relative;border-radius:var(--radius);overflow:hidden;background:#e8eaf2}
.car-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.car-slide{min-width:100%;aspect-ratio:16/9;background:var(--navy) center/cover;position:relative}
.car-cap{position:absolute;left:0;right:0;bottom:0;padding:22px 26px;color:#fff;font-weight:600;font-size:16px;background:linear-gradient(transparent,rgba(18,25,44,.7))}
.car-btn{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;border:0;cursor:pointer;background:rgba(255,255,255,.92);color:var(--navy);display:grid;place-items:center;z-index:3;transition:.2s;box-shadow:0 6px 18px -8px rgba(0,0,0,.4)}
.car-btn:hover{background:#fff;transform:translateY(-50%) scale(1.06)}
.car-btn.prev{left:18px}.car-btn.next{right:18px}
.car-dots{display:flex;gap:8px;justify-content:center;margin-top:18px}
.car-dots .d{width:9px;height:9px;border-radius:50%;background:#cfd4e2;border:0;cursor:pointer;transition:.2s;padding:0}
.car-dots .d.on{background:var(--navy);width:26px;border-radius:6px}
.car-slide{cursor:pointer}
.gal-all{display:inline-flex;align-items:center;gap:7px;background:none;border:1.5px solid var(--line);border-radius:12px;padding:10px 18px;font-weight:600;color:var(--navy);cursor:pointer;font-size:14px}
.gal-all:hover{border-color:var(--accent);color:var(--accent)}
.gal-mosaic{position:relative;display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:repeat(2,1fr);gap:8px;border-radius:18px;overflow:hidden;aspect-ratio:16/9}
.gal-mosaic.one{grid-template-columns:1fr;grid-template-rows:1fr;aspect-ratio:16/9}
.gm-cell{border:0;background:#222 center/cover;cursor:pointer;transition:filter .2s;min-height:0;min-width:0}
.gm-cell:hover{filter:brightness(.9)}
.gm-big{grid-row:1/3;grid-column:1}
.gm-all{position:absolute;right:14px;bottom:14px;display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--navy);border-radius:10px;padding:9px 15px;font-weight:600;font-size:13.5px;color:var(--navy);cursor:pointer;box-shadow:0 6px 18px -8px rgba(0,0,0,.45);z-index:2}
.gm-all:hover{background:var(--navy);color:#fff}
@media(max-width:680px){.gal-mosaic{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;aspect-ratio:auto;gap:8px}.gm-big{grid-column:1/3;aspect-ratio:3/2}.gm-cell:not(.gm-big){aspect-ratio:1/1}.gm-cell:nth-child(4),.gm-cell:nth-child(5){display:none}.gm-all{right:10px;bottom:10px;padding:7px 12px;font-size:12px;gap:6px}.gm-all svg{width:13px;height:13px}}
.gal-ov{position:fixed;inset:0;background:rgba(12,16,28,.93);display:none;z-index:200;overflow-y:auto;padding:62px 20px 30px}
.gal-ov.on{display:block}
.gal-x{position:fixed;top:14px;right:16px;width:44px;height:44px;border-radius:50%;border:0;background:rgba(255,255,255,.16);color:#fff;font-size:26px;line-height:1;cursor:pointer;z-index:6;display:grid;place-items:center}
.gal-x:hover{background:rgba(255,255,255,.3)}
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;max-width:1120px;margin:0 auto}
.gal-th{aspect-ratio:4/3;border:0;border-radius:10px;background:#222 center/cover;cursor:pointer;transition:transform .15s,outline .15s;outline:2px solid transparent}
.gal-th:hover{transform:scale(1.02);outline:2px solid var(--accent)}
.gal-single{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:60px 22px;z-index:4}
.gal-lb{position:fixed;inset:0;background:rgba(8,11,20,.95);display:none;align-items:center;justify-content:center;z-index:210;padding:60px 22px}
.gal-lb.on{display:flex}
.gal-lb img{max-width:92vw;max-height:84vh;border-radius:10px;object-fit:contain;box-shadow:0 30px 80px -30px rgba(0,0,0,.85)}
.gal-counter{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.85);font-size:14px;font-weight:600}
.gal-single img{max-width:92vw;max-height:82vh;border-radius:10px;object-fit:contain;box-shadow:0 30px 80px -30px rgba(0,0,0,.8)}
.gal-nav{position:fixed;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;border:0;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;display:grid;place-items:center;z-index:6}
.gal-nav:hover{background:rgba(255,255,255,.3)}
.gal-nav.gprev{left:16px}.gal-nav.gnext{right:16px}
.gal-back{position:fixed;top:15px;left:16px;border:0;background:rgba(255,255,255,.16);color:#fff;border-radius:10px;padding:9px 14px;cursor:pointer;font-weight:600;font-size:13.5px;z-index:6}
.gal-back:hover{background:rgba(255,255,255,.3)}
@media(max-width:560px){.gal-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}

/* RULES */
.rules{display:grid;grid-template-columns:repeat(3,1fr);gap:0 56px}
.rrow{display:flex;align-items:center;gap:16px;padding:22px 0;border-bottom:1px solid var(--line)}
.rrow .ic{width:30px;flex:none;color:var(--navy)}
.rrow .ic svg{width:30px;height:30px;stroke-width:1.4}
.rrow span{font-size:16px;color:var(--navy);font-family:var(--font-head);font-weight:500}

/* ABOUT specs */
.specs{display:grid;grid-template-columns:1fr 1fr;gap:18px 48px;max-width:880px;margin-top:40px}
.spec{border-bottom:1px solid var(--line);padding-bottom:14px}
.spec b{display:block;font-family:var(--font-head);color:var(--navy);font-size:13px;font-weight:700;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.spec span{font-size:16px}
.spec .spec-list{list-style:none;margin:0;padding:0;font-size:16px;color:var(--body)}
.spec .spec-list li{position:relative;padding-left:16px;margin:2px 0;line-height:1.4}
.spec .spec-list li:before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent)}

/* REVIEWS */
.rev-bar{background:var(--soft-2);border-radius:20px;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:28px}
.rev-bar .l{display:flex;align-items:center;gap:14px}
.rev-bar .score{font-family:var(--font-head);font-weight:800;font-size:30px;color:var(--navy)}
.stars{color:#f5b315;letter-spacing:1px;font-size:18px}
.rev-bar .cnt{font-size:15px;color:var(--muted)}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.rcard{background:var(--soft-2);border-radius:20px;padding:24px}
.rcard .top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rcard .av{width:42px;height:42px;border-radius:50%;background:#dfe3f0;flex:none;display:grid;place-items:center;color:var(--navy);font-family:var(--font-head);font-weight:700}
.rcard .nm{font-family:var(--font-head);font-weight:700;color:var(--navy);font-size:15px}
.rcard .tm{font-size:12.5px;color:var(--muted)}
.rcard .st{color:#f5b315;font-size:15px;margin-bottom:8px}
.rcard p{margin:0;font-size:14.5px;color:#404a5e;line-height:1.6}

/* FAQ */
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px 64px}
.faq-cat h3{font-family:var(--font-head);font-size:15px;letter-spacing:.04em;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.qa{border-bottom:1px solid var(--line)}
.qa button{width:100%;text-align:left;background:none;border:0;cursor:pointer;padding:18px 36px 18px 0;position:relative;font-family:var(--font-head);font-weight:600;font-size:16.5px;color:var(--navy);line-height:1.35}
.qa button .ch{position:absolute;right:2px;top:20px;width:16px;height:16px;transition:.3s;color:var(--muted)}
.qa.open .ch{transform:rotate(180deg)}
.qa .ans{max-height:0;overflow:hidden;transition:max-height .35s ease}
.qa .ans p{margin:0;padding:0 0 18px;font-size:15.5px;color:var(--body)}

/* LOCATION */
.loc-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:48px;align-items:center}
.map-wrap{border-radius:var(--radius);overflow:hidden;min-height:420px;border:1px solid var(--line)}
.map-wrap iframe{width:100%;height:100%;min-height:420px;border:0;display:block}
.loc-cta{margin-top:24px;display:flex;gap:13px;flex-wrap:wrap}

/* FOOTER */
footer{background:var(--footer);color:rgba(255,255,255,.7);padding:66px 0 34px}
.f-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px}
.f-brand b{font-family:var(--font-head);font-weight:800;font-size:22px;color:#fff;letter-spacing:.02em}
.f-brand p{font-size:14.5px;margin:14px 0 0;max-width:34ch;color:rgba(255,255,255,.6)}
footer h5{font-family:var(--font-head);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin:0 0 16px;font-weight:700}
footer a{display:block;color:rgba(255,255,255,.74);font-size:14.5px;padding:6px 0}
footer a:hover{color:#fff}
.f-bot{margin-top:46px;padding-top:24px;border-top:1px solid rgba(255,255,255,.12);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:13px;color:rgba(255,255,255,.45)}
.f-bot a{display:inline;color:rgba(255,255,255,.7)}

/* AMENITIES checklist grid */
.am-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.am-legend{display:flex;gap:8px;flex-wrap:wrap}
.am-legend .lg{display:inline-flex;align-items:center;gap:7px;background:var(--soft-2);border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--body)}
.am-tag-x{font-size:10.5px;font-weight:700;color:#b5762a;background:#fdf3e3;border-radius:6px;padding:1px 7px;margin-left:5px;white-space:nowrap}
.am-tag-l{font-size:10.5px;font-weight:700;color:#5a6b8c;background:#eef1f7;border-radius:6px;padding:1px 7px;margin-left:5px;white-space:nowrap}
.am-cols{columns:3;column-gap:42px;margin-top:24px}
.am-cat{break-inside:avoid;margin-bottom:26px;display:inline-block;width:100%}
.am-cat h4{display:flex;align-items:center;gap:10px;font-family:var(--font-head);font-size:16px;color:var(--navy);margin-bottom:12px;font-weight:700}
.am-cat h4 .ic{width:22px;height:22px;color:var(--accent);flex:none}
.am-cat h4 .ic svg{width:22px;height:22px;stroke-width:1.5}
.am-cat ul{list-style:none;margin:0;padding:0}
.am-cat li{display:flex;align-items:flex-start;gap:10px;font-size:14.5px;color:var(--body);padding:5px 0}
.am-cat li .ck{color:var(--navy);flex:none;margin-top:3px}
.am-cat li .ck svg{width:14px;height:14px;display:block;stroke-width:2.6}
.am-cat li.feat{color:var(--navy);font-weight:600}
.am-acc-list{margin-top:24px;max-width:880px}
.am-acc{border-bottom:1px solid var(--line)}
.am-acc>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:18px 2px;font-family:var(--font-head);font-weight:700;color:var(--navy);font-size:18px}
.am-acc>summary::-webkit-details-marker{display:none}
.am-acc>summary .ic{width:22px;height:22px;color:var(--accent);flex:none}
.am-acc>summary .ic svg{width:22px;height:22px;stroke-width:1.5}
.am-acc>summary .am-acc-n{font-family:var(--font-body,inherit);font-size:13px;font-weight:600;color:var(--muted);background:var(--soft-2);border-radius:20px;padding:2px 10px}
.am-acc>summary .am-acc-ch{margin-left:auto;transition:transform .2s;color:var(--muted);flex:none}
.am-acc[open]>summary .am-acc-ch{transform:rotate(180deg)}
.am-acc>summary:hover{color:var(--accent)}
.am-acc ul{list-style:none;margin:0;padding:0 0 16px 2px}
.am-acc>.grp-chips{padding:2px 0 18px}
.am-acc li{display:flex;align-items:flex-start;gap:10px;font-size:14.5px;color:var(--body);padding:5px 0}
.am-acc li .ck{color:var(--navy);flex:none;margin-top:3px}
.am-acc li .ck svg{width:14px;height:14px;display:block;stroke-width:2.6}
.am-acc li.feat{color:var(--navy);font-weight:600}

/* STICKY CTA (mobile) */
.sticky-cta{position:fixed;left:0;right:0;bottom:0;z-index:70;background:#fff;border-top:1px solid var(--line);padding:12px 18px;display:none;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -8px 30px -20px rgba(0,0,0,.3)}
.sticky-cta .pr{font-family:var(--font-head);font-weight:700;color:var(--navy);font-size:15px;line-height:1.1}
.sticky-cta .pr small{display:block;color:var(--muted);font-size:11px;font-weight:500}
.sticky-cta .btn{padding:12px 22px;font-size:15px}

/* mobile menu */
.mmenu{position:fixed;inset:0;z-index:90;background:var(--navy);display:none;flex-direction:column;padding:90px 32px;gap:4px}
.mmenu.show{display:flex}
.mmenu a{color:#fff;font-family:var(--font-head);font-weight:700;font-size:28px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.12)}

/* ---- visible availability calendar ---- */
.av-wrap{margin-top:8px}
.rmcard-avail{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:none;border:0;color:var(--accent);font-weight:600;font-size:13.5px;cursor:pointer;padding:4px 0}
.rmcard-avail svg{flex:none}
.rmcard-avail:hover{text-decoration:underline}
.av-ov{position:fixed;inset:0;background:rgba(16,22,38,.62);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:150;padding:18px}
.av-ov.on{display:flex}
.av-modal{position:relative;width:min(520px,100%);max-height:92vh;overflow-y:auto;background:#fff;border-radius:22px;box-shadow:0 40px 90px -40px rgba(0,0,0,.6)}
.av-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:20px 22px 2px}
.av-head h3{font-family:var(--font-head);font-size:20px;color:var(--navy);margin:0}
.av-head small{color:var(--muted);font-size:13px}
.av-x{width:36px;height:36px;border-radius:50%;border:0;background:#f1f3f8;color:var(--navy);font-size:23px;line-height:1;cursor:pointer;flex:none;display:grid;place-items:center}
.av-x:hover{background:#e6e9f0}
.av-select{margin:4px 16px 18px;width:calc(100% - 32px);justify-content:center}
.av-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px}
.av-nav span{font-family:var(--font-head);font-size:17px;color:var(--navy);text-transform:capitalize}
.av-nav button{width:36px;height:36px;border:1px solid var(--line);background:#fff;border-radius:10px;font-size:20px;cursor:pointer;color:var(--navy);line-height:1}
.av-nav button:hover{border-color:var(--accent);color:var(--accent)}
.av-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:4px 14px 12px}
.av-grid .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 0}
.av-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:14px;position:relative;min-height:46px}
.av-day .av-d{font-weight:600;color:var(--navy);line-height:1}
.av-day.free{background:color-mix(in srgb,var(--accent) 7%,#fff);border:1px solid color-mix(in srgb,var(--accent) 16%,#fff)}
.av-day.free .av-p{font-size:11px;font-weight:700;color:var(--accent);line-height:1}
.av-day.occ{background:#fbeaea;border:1px solid #f3d6d6}
.av-day.occ .av-d{color:#c98a8a}
.av-day.occ .av-x{font-size:9px;font-weight:700;color:#c98a8a;text-transform:uppercase;letter-spacing:.02em}
.av-day.past{background:#fafbfc}
.av-day.past .av-d{color:#cdd2dd;font-weight:400}
.av-legend{display:flex;gap:18px;justify-content:center;align-items:center;padding:2px 16px 8px;font-size:12.5px;color:var(--muted)}
.av-legend span{display:flex;align-items:center;gap:7px}
.av-lg{width:14px;height:14px;border-radius:4px;display:inline-block}
.av-free{background:color-mix(in srgb,var(--accent) 16%,#fff);border:1px solid color-mix(in srgb,var(--accent) 30%,#fff)}
.av-occ{background:#fbeaea;border:1px solid #f3d6d6}
.av-cap{padding:0 16px 16px;font-size:12.5px;color:var(--muted);text-align:center}
@media(max-width:560px){.av-day{min-height:40px;font-size:13px}.av-day.free .av-p{font-size:10px}}

.split.no-img{grid-template-columns:1fr;max-width:760px}
.fcard.no-img{grid-template-columns:1fr}

.sec-head{margin-bottom:26px}
.grp-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:30px}
.grp h3{font-family:var(--font-head);font-size:17px;color:var(--navy);margin-bottom:13px}
.grp-chips{display:flex;flex-wrap:wrap;gap:8px}
.grp-chips span{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:13.5px;color:var(--navy)}
.grp-chips i{font-style:normal;color:var(--accent);font-size:11px;margin-left:5px;font-weight:700;text-transform:uppercase}
</style>

function initGallery(){
  const gridOv=document.getElementById('galGridOv'); if(!gridOv) return;
  const lbOv=document.getElementById('galLbOv');
  const thumbs=[...gridOv.querySelectorAll('.gal-th')]; if(!thumbs.length) return;
  const imgs=thumbs.map(t=>t.dataset.src);
  const big=lbOv.querySelector('#galImg'), counter=lbOv.querySelector('#galCounter');
  let cur=0;
  function lock(){ document.body.style.overflow='hidden'; }
  function unlockIfClosed(){ if(!gridOv.classList.contains('on')&&!lbOv.classList.contains('on')) document.body.style.overflow=''; }
  function openGrid(){ gridOv.classList.add('on'); gridOv.setAttribute('aria-hidden','false'); lock(); gridOv.scrollTop=0; }
  function closeGrid(){ gridOv.classList.remove('on'); gridOv.setAttribute('aria-hidden','true'); unlockIfClosed(); }
  function openLb(k){ cur=(k+imgs.length)%imgs.length; big.src=imgs[cur]; counter.textContent=(cur+1)+' / '+imgs.length; lbOv.classList.add('on'); lbOv.setAttribute('aria-hidden','false'); lock(); }
  function closeLb(){ lbOv.classList.remove('on'); lbOv.setAttribute('aria-hidden','true'); unlockIfClosed(); }
  thumbs.forEach((t,idx)=>t.onclick=()=>openLb(idx));
  gridOv.querySelector('#galGridX').onclick=closeGrid;
  lbOv.querySelector('#galLbX').onclick=closeLb;
  lbOv.querySelector('#galPrev').onclick=()=>openLb(cur-1);
  lbOv.querySelector('#galNext').onclick=()=>openLb(cur+1);
  gridOv.addEventListener('click',e=>{ if(e.target===gridOv) closeGrid(); });
  lbOv.addEventListener('click',e=>{ if(e.target===lbOv) closeLb(); });
  document.addEventListener('keydown',e=>{
    if(lbOv.classList.contains('on')){ if(e.key==='Escape')closeLb(); else if(e.key==='ArrowLeft')openLb(cur-1); else if(e.key==='ArrowRight')openLb(cur+1); }
    else if(gridOv.classList.contains('on')&&e.key==='Escape') closeGrid();
  });
  // mosaic photos open the lightbox directly; "Vezi toate pozele" opens the scrollable grid
  document.querySelectorAll('[data-gallery]').forEach(el=>el.addEventListener('click',()=>{ const i=el.getAttribute('data-i'); if(i!=null&&i!=='') openLb(+i); else openGrid(); }));
}

    </div>`).join('')}

function rAmenities(){
  if((THEME.facilitiesStyle||'rows')!=='grid') return '';
  const a=PROPERTY.amenities; if(!a||!has(a.categories)) return '';
  const norm=it=>{
    if(typeof it==='string') return {name:it};
    return {
      name: it.name||'',
      feat: it.featured===true || it.premiumFacility===true,
      extra: it.extra===true || /supliment|extra|cost/i.test(it.priceRule||''),
      offsite: it.offsite===true || /afara|offsite/i.test(it.locationRule||'')
    };
  };
  const cats=a.categories.map(c=>{
    const seen=new Set();
    const items=(c.items||[]).map(norm).filter(x=>{
      const k=(x.name||'').toLowerCase().trim();
      if(!k||seen.has(k)) return false; seen.add(k); return true;
    });
    return {title:c.title, icon:c.icon, items};
  }).filter(c=>has(c.items));
  if(!has(cats)) return '';
  const ck='<span class="ck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12l5 5L20 6"/></svg></span>';
  const showLegend = a.legend!==false && cats.some(c=>c.items.some(i=>i.extra||i.offsite));
  return `<section class="sec tight" id="facilitati"><div class="wrap">
    <div class="am-head rv"><h2 class="h2">Facilități</h2>
    ${showLegend?`<div class="am-legend">
      <span class="lg"><span class="am-tag-x" style="margin:0">$</span> Cost suplimentar</span>
      <span class="lg"><span class="am-tag-l" style="margin:0">loc</span> În afara locației</span>
    </div>`:''}</div>
    <div class="am-acc-list rv">
      ${cats.map(c=>`<details class="am-acc"><summary>${c.icon?`<span class="ic">${icon(c.icon)}</span>`:''}<span class="am-acc-t">${esc(c.title)}</span><span class="am-acc-n">${c.items.length}</span><svg class="am-acc-ch" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></summary>
        <ul>${c.items.map(i=>`<li class="${i.feat?'feat':''}">${ck}<span>${esc(i.name)}${i.extra?'<span class="am-tag-x">$</span>':''}${i.offsite?'<span class="am-tag-l">în afara locației</span>':''}</span></li>`).join('')}</ul>
      </details>`).join('')}
    </div></div></section>`;
}

function rReviews(){
  const r=PROPERTY.reviews; if(!r||!has(r.items)) return '';
  const showScore = typeof r.average==='number' && r.average >= (THEME.reviewScoreThreshold||0);
  return `<section class="sec tight" id="recenzii"><div class="wrap">
    <div class="gal-head rv"><h2>Ce spun oaspeții</h2></div>

function _som(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function _piso(s){ const a=s.split('-').map(Number); return new Date(a[0],a[1]-1,a[2]); }
function _iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function _fmtH(s){ return _piso(s).toLocaleDateString('ro-RO',{day:'numeric',month:'short'}); }

function initBooking(){
  const sec = document.getElementById('rezervare'); if(!sec) return;
  const R = PROPERTY.rentals||[]; if(!R.length) return;
  const cur = (R[0]&&R[0].currency)||'RON';
  const slug = (window.STAY_SLUG||new URLSearchParams(location.search).get('slug')||'');
  const byId={}; R.forEach(r=>byId[r.id]=r);
  const entR = R.find(r=>r.isEntire)||null;
  const st = { entire:false, rooms:new Set(), qty:{}, guests:{adults:2,children:0,infants:0,pets:0}, ci:null, co:null, blocked:{}, month:_som(new Date()) };
  const $ = s=>sec.querySelector(s);

  if(slug){ fetch('/api/availability/'+encodeURIComponent(slug)).then(r=>r.ok?r.json():null).then(d=>{ if(d&&d.units) st.blocked=d.units; }).catch(()=>{}); }

  function selectedIds(){ return st.entire?['__entire']:[...st.rooms]; }
  function entireOpt(){
    if(entR) return Object.assign({}, entR, {name:'Toată proprietatea', weekday:entR.weekday, weekend:entR.weekend||entR.weekday, currency:entR.currency||cur, minNights:entR.minNights||1});
    const w=Math.min.apply(null,R.map(r=>r.weekday||Infinity)), we=Math.min.apply(null,R.map(r=>r.weekend||r.weekday||Infinity));
    return {name:'Toată proprietatea',weekday:isFinite(w)?w:0,weekend:isFinite(we)?we:0,currency:cur,minNights:1};
  }
  function optFor(id){ return id==='__entire'?entireOpt():byId[id]; }
  function activeBlocked(){
    const s=new Set();
    if(st.entire){ ((entR?st.blocked[entR.id]:st.blocked.__all)||[]).forEach(d=>s.add(d)); }
    else { st.rooms.forEach(rid=>(st.blocked[rid]||[]).forEach(d=>s.add(d))); }
    return s;
  }
  function nights(){ if(!st.ci||!st.co) return []; const out=[]; for(let d=_piso(st.ci); _iso(d)<st.co; d.setDate(d.getDate()+1)) out.push(_iso(d)); return out; }
  function _wknd(ds){ const d=_piso(ds).getDay(); return d===5||d===6; }
  function _priceKeyId(id){ return id==='__entire' ? (entR?entR.id:'__entire') : id; }
  function nightPrice(id,opt,ds){
    const PP=PROPERTY.pricing||{}, dp=PP.dayPrices||{}, periods=PP.periods||[];
    const kid=_priceKeyId(id);
    if(dp[kid] && dp[kid][ds]!=null) return +dp[kid][ds];
    const we=_wknd(ds);
    let base = we ? (opt.weekend||opt.weekday||0) : (opt.weekday||0);
    for(const p of periods){ if((p.roomId==='all'||p.roomId===kid) && p.start&&p.end && ds>=p.start && ds<=p.end){ base = we ? (p.weekend||p.weekday||base) : (p.weekday||base); } }
    return base;
  }
  function priceOf(id,opt,arr){ let t=0; arr.forEach(s=>t+=nightPrice(id,opt,s)); return t; }

  sec.querySelectorAll('.bk-sel').forEach(btn=>btn.onclick=()=>{
    const rid=btn.dataset.rid;
    if(rid==='__entire'){ st.entire=!st.entire; if(st.entire) st.rooms.clear(); }
    else { if(st.rooms.has(rid)) st.rooms.delete(rid); else { st.rooms.add(rid); st.entire=false; if(!st.qty[rid]) st.qty[rid]=1; } }
    refreshSel();
  });
  function qtyOf(id){ return id==='__entire'?1:(st.qty[id]||1); }
  function refreshSel(){
    sec.querySelectorAll('.bk-card').forEach(c=>{
      const rid=c.dataset.rid, on = rid==='__entire'?st.entire:st.rooms.has(rid);
      c.classList.toggle('on',on);
      c.querySelector('.bk-sel').textContent = on?'Selectat ✓':'Selectează';
    });
    renderSummary();
  }
  function guestsText(){ const g=st.guests, p=[];
    p.push(g.adults+(g.adults===1?' adult':' adulți'));
    if(g.children) p.push(g.children+(g.children===1?' copil':' copii'));
    if(g.infants) p.push(g.infants+(g.infants===1?' bebeluș':' bebeluși'));
    if(g.pets) p.push(g.pets+(g.pets===1?' animal':' animale'));
    return p.join(', ');
  }
  function roomsCount(){ return st.entire?1:[...st.rooms].reduce((s,id)=>s+qtyOf(id),0); }
  function renderSummary(){
    const ids=selectedIds();
    const gl=$('#bkGuestsLbl'); if(gl) gl.textContent=guestsText();
    const sel=$('#bkSelected'), tot=$('#bkTotal');
    if(!ids.length){ sel.innerHTML='<small>Nu ai selectat nicio cameră</small>'; tot.innerHTML=''; updateMbar(); return; }
    const ds=nights(); let rows='', total=0;
    ids.forEach(id=>{ const o=optFor(id), q=qtyOf(id), p=ds.length?priceOf(id,o,ds)*q:0; total+=p;
      const stepper = id==='__entire' ? '' :
        '<div class="bk-qty" data-rid="'+esc(id)+'"><button type="button" class="bk-stepb" data-q="-1">−</button><span>'+q+'</span><button type="button" class="bk-stepb" data-q="1">+</button></div>';
      rows+='<div class="bk-srow"><div class="bk-srow-main"><span class="bk-srow-name">'+esc(o.name)+'</span><b>'+(ds.length?(p+' '+cur):'—')+'</b></div>'+stepper+'</div>';
    });
    sel.innerHTML=rows;
    sel.querySelectorAll('.bk-qty').forEach(box=>{ const rid=box.dataset.rid;
      box.querySelectorAll('.bk-stepb').forEach(b=>b.onclick=()=>{
        const delta=+b.dataset.q, q=st.qty[rid]||1;
        if(delta<0 && q<=1){ st.rooms.delete(rid); delete st.qty[rid]; refreshSel(); return; } // remove/deselect
        st.qty[rid]=Math.max(1,q+delta); renderSummary();
      });
    });

  syncGuests();

function rAvailability(){
  const R=(PROPERTY.rentals||[]); if(!R.length) return '';
  return `<div class="av-ov" id="avOv"><div class="av-modal">
    <div class="av-head"><div><h3 id="avRoomName">Disponibilitate</h3><small id="avRoomSub"></small></div><button type="button" class="av-x" id="avX" aria-label="Închide">&times;</button></div>
    <div class="av-nav"><button type="button" id="avPrev" aria-label="Luna anterioară">‹</button><span id="avTitle"></span><button type="button" id="avNext" aria-label="Luna următoare">›</button></div>
    <div class="av-grid" id="avGrid"></div>
    <div class="av-legend"><span><i class="av-lg av-free"></i>Liber</span><span><i class="av-lg av-occ"></i>Ocupat</span></div>
    <div class="av-cap" id="avCap"></div>
    <button type="button" class="btn btn-accent av-select" id="avSelect">Selectează această variantă</button>
  </div></div>`;
}
function initAvailability(){
  const ov=document.getElementById('avOv'); if(!ov) return;
  const R=PROPERTY.rentals||[]; if(!R.length) return;
  const cur=(R[0]&&R[0].currency)||'RON';
  const slug=(window.STAY_SLUG||new URLSearchParams(location.search).get('slug')||'');
  const byId={}; R.forEach(r=>byId[r.id]=r);
  const entR=R.find(r=>r.isEntire)||null;
  const $=s=>ov.querySelector(s);
  const stt={ scope:(PROPERTY.entireUnitRental?'__entire':(R[0]&&R[0].id)), blocked:{}, month:_som(new Date()) };
  function _wknd(ds){ const d=_piso(ds).getDay(); return d===5||d===6; }
  function keyId(id){ return id==='__entire'?(entR?entR.id:'__entire'):id; }
  function optFor(id){ if(id==='__entire'){ if(entR) return entR; const w=Math.min.apply(null,R.map(r=>r.weekday||Infinity)),we=Math.min.apply(null,R.map(r=>r.weekend||r.weekday||Infinity)); return {weekday:isFinite(w)?w:0,weekend:isFinite(we)?we:0,currency:cur}; } return byId[id]||{weekday:0,weekend:0,currency:cur}; }
  function nameFor(id){ return id==='__entire'?'Toată proprietatea':((byId[id]&&byId[id].name)||'Cameră'); }
  function nightPrice(id,ds){ const opt=optFor(id); const PP=PROPERTY.pricing||{},dp=PP.dayPrices||{},periods=PP.periods||[],kid=keyId(id); if(dp[kid]&&dp[kid][ds]!=null) return +dp[kid][ds]; const we=_wknd(ds); let base=we?(opt.weekend||opt.weekday||0):(opt.weekday||0); for(const p of periods){ if((p.roomId==='all'||p.roomId===kid)&&p.start&&p.end&&ds>=p.start&&ds<=p.end){ base=we?(p.weekend||p.weekday||base):(p.weekday||base);} } return base; }
  function blockedFor(id){ if(id==='__entire'){ return new Set((entR?stt.blocked[entR.id]:stt.blocked.__all)||[]); } return new Set(stt.blocked[id]||[]); }

  if(slug){ fetch('/api/availability/'+encodeURIComponent(slug)).then(r=>r.ok?r.json():null).then(d=>{ if(d&&d.units){ stt.blocked=d.units; if(ov.classList.contains('on')) draw(); } }).catch(()=>{}); }

  $('#avPrev').onclick=()=>{ stt.month.setMonth(stt.month.getMonth()-1); draw(); };
  $('#avNext').onclick=()=>{ stt.month.setMonth(stt.month.getMonth()+1); draw(); };
  $('#avX').onclick=closeAvail;
  ov.onclick=e=>{ if(e.target===ov) closeAvail(); };
  document.addEventListener('keydown',e=>{ if(ov.classList.contains('on')&&e.key==='Escape') closeAvail(); });
  $('#avSelect').onclick=()=>{ const b=document.querySelector('.bk-sel[data-rid="'+(window.CSS&&CSS.escape?CSS.escape(stt.scope):stt.scope)+'"]'); if(b&&!/Selectat/.test(b.textContent)) b.click(); closeAvail(); const f=document.getElementById('bkSummary'); if(f&&f.scrollIntoView) f.scrollIntoView({behavior:'smooth',block:'center'}); };

  function openAvail(scope){ stt.scope=scope||stt.scope; stt.month=_som(new Date());
    $('#avRoomName').textContent='Disponibilitate'; $('#avRoomSub').textContent=nameFor(stt.scope);
    ov.classList.add('on'); document.body.style.overflow='hidden'; draw(); }
  function closeAvail(){ ov.classList.remove('on'); document.body.style.overflow=''; }

  // wire the per-room "Vezi disponibilitatea" buttons (they live in the booking section)
  document.querySelectorAll('[data-avail]').forEach(b=>b.onclick=()=>openAvail(b.dataset.avail));

  function draw(){
    const m=stt.month,y=m.getFullYear(),mo=m.getMonth(),today=_iso(new Date());
    $('#avTitle').textContent=m.toLocaleDateString('ro-RO',{month:'long',year:'numeric'});
    const blocked=blockedFor(stt.scope);
    const startDow=(new Date(y,mo,1).getDay()+6)%7, days=new Date(y,mo+1,0).getDate();
    let html=''; ['Lu','Ma','Mi','Jo','Vi','Sâ','Du'].forEach(x=>html+='<div class="cal-dow">'+x+'</div>');
    for(let i=0;i<startDow;i++) html+='<div></div>';
    for(let d=1;d<=days;d++){
      const ds=_iso(new Date(y,mo,d)), past=ds<today, blk=blocked.has(ds);
      let cls='av-day'; if(past) cls+=' past'; else if(blk) cls+=' occ'; else cls+=' free';
      const label = past ? '' : (blk ? '<span class="av-x">ocupat</span>' : '<span class="av-p">'+nightPrice(stt.scope,ds)+'</span>');
      html+='<div class="'+cls+'"><span class="av-d">'+d+'</span>'+label+'</div>';
    }
    $('#avGrid').innerHTML=html;
    const c=(optFor(stt.scope).currency)||cur;
    $('#avCap').textContent='Prețuri orientative în '+c+' / noapte.';
  }
}

function rServices(){ return rGroupSec('servicii','La fața locului','Servicii', PROPERTY.services); }

function rIncludes(){
  // gather categories from all sources -> {title, items:[{name,extra,offsite}]}
  const cats=[];
  const norm=it=> typeof it==='string'?{name:it}:{name:(it&&it.name)||'',extra:!!(it&&it.extra),offsite:!!(it&&it.offsite)};
  // 1) facilities (curated) — supports both array and {categories}
  const amen=Array.isArray(PROPERTY.amenities)?PROPERTY.amenities:((PROPERTY.amenities&&PROPERTY.amenities.categories)||[]);
  amen.forEach(c=>{ if(/cele mai apreciate/i.test(c.title||'')) return; cats.push({title:c.title,items:(c.items||[]).map(norm)}); });
  // 2) activities, 3) services (grouped)
  (PROPERTY.activities||[]).forEach(g=>cats.push({title:g.title,items:(g.items||[]).map(norm)}));
  (PROPERTY.services||[]).forEach(g=>cats.push({title:g.title,items:(g.items||[]).map(norm)}));
  // 4) wellness highlight
  const h=PROPERTY.highlight; if(h&&has(h.features)) cats.push({title:h.heading||'Spa & wellness',items:h.features.map(f=>({name:f.label}))});
  // merge by title + global item de-dup (first occurrence wins)
  const seen=new Set(), byTitle=new Map();
  cats.forEach(c=>{ const key=String(c.title||'').toLowerCase().trim(); if(!key) return;
    let cat=byTitle.get(key); if(!cat){ cat={title:c.title,items:[]}; byTitle.set(key,cat); }
    (c.items||[]).forEach(it=>{ const n=(it.name||'').trim(); if(!n) return; const g=n.toLowerCase(); if(seen.has(g)) return; seen.add(g); cat.items.push({name:n,extra:it.extra,offsite:it.offsite}); });
  });
  const list=[...byTitle.values()].filter(c=>has(c.items));
  if(!has(list)) return '';
  return `<section class="sec tight" id="facilitati"><div class="wrap">
    <div class="rv sec-head"><span class="eyebrow">Ce include</span><h2>Facilități &amp; servicii</h2></div>
    <div class="am-acc-list rv">${list.map(c=>`
      <details class="am-acc"><summary><span class="am-acc-t">${esc(c.title)}</span><span class="am-acc-n">${c.items.length}</span><svg class="am-acc-ch" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></summary>
      <div class="grp-chips">${c.items.map(it=>`<span>${esc(it.name)}${it.extra?'<i title="cost suplimentar">$</i>':''}${it.offsite?'<i title="în afara locației">loc</i>':''}</span>`).join('')}</div>
      </details>`).join('')}</div>
  </div></section>`;
}

function render(){
  setTheme();
  document.getElementById('app').innerHTML = [
    rNav(), rHero(), rAbout(), rOverview(), rGalleries(),
    rBooking(), rIncludes(), rAvailability(), rLocation(),
    rRulesAbout(), rFaq(), rFooter()
  ].join('');
  wire();
}

/* ---------- behaviors ---------- */
function wire(){
  const y=document.getElementById('yr'); if(y) y.textContent=new Date().getFullYear();
  const nav=document.getElementById('nav');
  const onScroll=()=>nav&&nav.classList.toggle('solid',window.scrollY>window.innerHeight*0.7);
  onScroll(); addEventListener('scroll',onScroll,{passive:true});

  const mm=document.getElementById('mmenu'), bg=document.getElementById('burger'), mx=document.getElementById('mx');
  if(bg) bg.onclick=()=>mm.classList.add('show');
  if(mx) mx.onclick=()=>mm.classList.remove('show');
  if(mm) mm.querySelectorAll('a').forEach(a=>a.onclick=()=>mm.classList.remove('show'));

  document.querySelectorAll('.qa button').forEach(b=>b.onclick=()=>{
    const qa=b.parentElement, ans=qa.querySelector('.ans'), open=qa.classList.contains('open');
    if(open){qa.classList.remove('open');ans.style.maxHeight=null;}
    else{qa.classList.add('open');ans.style.maxHeight=ans.scrollHeight+'px';}
  });

  document.querySelectorAll('[data-carousel]').forEach(car=>{
    const track=car.querySelector('.car-track'), n=track.children.length, dotsWrap=car.nextElementSibling;
    let i=0;
    for(let d=0;d<n;d++){const x=document.createElement('button');x.className='d'+(d?'':' on');x.onclick=()=>go(d);dotsWrap.appendChild(x);}
    const dots=dotsWrap.querySelectorAll('.d');
    function go(k){i=(k+n)%n;track.style.transform='translateX(-'+(i*100)+'%)';dots.forEach((d,j)=>d.classList.toggle('on',j===i));}
    car.querySelector('.prev').onclick=()=>go(i-1); car.querySelector('.next').onclick=()=>go(i+1);
    let t=setInterval(()=>go(i+1),6000);
    car.addEventListener('mouseenter',()=>clearInterval(t));
    car.addEventListener('mouseleave',()=>t=setInterval(()=>go(i+1),6000));
  });

  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv').forEach(el=>io.observe(el));
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) document.querySelectorAll('.rv').forEach(el=>el.classList.add('in'));
  try{ initBooking(); }catch(e){ console.error('booking init', e); }
  try{ initAvailability(); }catch(e){ console.error('availability init', e); }
  try{ initGallery(); }catch(e){ console.error('gallery init', e); }
}

/* mark JS active so reveal animations apply; without JS, content stays visible */
document.documentElement.classList.add('js');

/* connected store: load by ?slug= from the importer/admin */
try{
  var _sp=new URLSearchParams(location.search).get("slug");
  if(_sp){ var _d=JSON.parse(localStorage.getItem("stay_site_"+_sp)||"null");
    if(_d){ window.STAY_PROPERTY=_d;
      var _ph=(_d._contact&&_d._contact.phone)||"";
      window.STAY_THEME=Object.assign({brandName:_d.name||"",brandSub:(_d.location&&_d.location.area)||""},
        _ph?{booking:{phone:_ph,whatsapp:_ph.replace(/[^0-9]/g,""),url:""}}:{});
    }
  }
}catch(e){}

/* allow the platform to inject data before render */
if (typeof window!=='undefined' && window.STAY_PROPERTY) PROPERTY = window.STAY_PROPERTY;
if (typeof window!=='undefined' && window.STAY_THEME) THEME = Object.assign({}, THEME, window.STAY_THEME);

render();
</script>
