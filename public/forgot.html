<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>LocalStay · Recuperare parolă</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#e6e9ee;--ink:#1c2430;--text:#566072;--muted:#8b94a3;--brand:#2f7355;--brand-d:#255c44;--brand-soft:#e8f2ec;--red:#cf4b4b;--shadow:0 1px 2px rgba(16,24,40,.04),0 24px 60px -28px rgba(16,24,40,.4)}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#15201a 0,#15201a 280px,var(--bg) 280px,var(--bg) 100%);min-height:100vh;color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:430px;margin:0 auto;padding:60px 20px}
.brand{display:flex;align-items:center;gap:11px;color:#fff;margin-bottom:26px}
.brand .dot{width:38px;height:38px;border-radius:10px;background:var(--brand);display:grid;place-items:center}
.brand b{font-size:18px}
.brand small{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#9fbaab;margin-top:1px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:28px 26px}
h1{font-size:20px;color:var(--ink);margin:0 0 6px}
.sub{color:var(--muted);font-size:14px;margin:0 0 20px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:0 0 6px}
input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:15px;color:var(--ink);font-family:inherit;background:#fcfdfe}
input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);background:#fff}
.btn{width:100%;margin-top:20px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;border-radius:11px;padding:13px 22px;cursor:pointer;border:0;background:var(--brand);color:#fff;transition:.18s}
.btn:hover{background:var(--brand-d)}.btn:disabled{opacity:.6;cursor:default}
.err{color:var(--red);font-size:14px;margin-top:14px;display:none}
.ok{background:var(--brand-soft);color:var(--brand-d);border-radius:12px;padding:16px;font-size:14px;font-weight:500}
.foot{text-align:center;color:var(--muted);font-size:13px;margin-top:18px}
.foot a{color:var(--brand);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 10l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg></span><span><b>LocalStay</b><small>Recuperare parolă</small></span></div>
  <div class="card" id="card">
    <h1>Ai uitat parola?</h1>
    <p class="sub">Introdu adresa de email a contului. Administratorul îți va trimite un link de resetare.</p>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="nume@exemplu.ro" autofocus>
    <div class="err" id="err"></div>
    <button class="btn" id="btn">Trimite cererea</button>
  </div>
  <div class="foot"><a href="/login">← Înapoi la autentificare</a></div>
</div>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var btn=$("btn"), err=$("err");
  async function submit(){
    err.style.display="none";
    var email=$("email").value.trim();
    if(!email){ err.textContent="Introdu adresa de email."; err.style.display="block"; return; }
    btn.disabled=true; btn.textContent="Se trimite…";
    try{
      await fetch("/api/auth/forgot",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email})});
      $("card").innerHTML='<h1>Cerere trimisă</h1><div class="ok">Dacă adresa există în sistem, administratorul platformei va primi cererea și îți va trimite un link de resetare a parolei. Verifică-ți mesajele (email / WhatsApp).</div>';
    }catch(e){ err.textContent="Eroare de rețea. Reîncearcă."; err.style.display="block"; btn.disabled=false; btn.textContent="Trimite cererea"; }
  }
  btn.addEventListener("click",submit);
  $("email").addEventListener("keydown",function(e){ if(e.key==="Enter") submit(); });
})();
</script>
</body>
</html>
